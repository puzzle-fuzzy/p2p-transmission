<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2d2d2d">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta
      name="description"
      content="无需注册的临时点对点文本与文件传输工具"
    >
    <link rel="manifest" href="/manifest.webmanifest">
    <title>{app_title}</title>
    <link rel="stylesheet" href="/shell/app.css">
    <script src="/shell/app-shell.js" defer></script>
  </head>
  <body>
    <div id="main">
      <div id="boot-fallback" class="app-shell" aria-busy="true">
        <main class="lobby">
          <section class="booting-view" role="status" aria-live="polite">
            <span class="service-dot" aria-hidden="true"></span>
            <p>正在准备安全会话…</p>
            <noscript>
              <span>传输工作区需要浏览器启用 JavaScript 和 WebAssembly。</span>
            </noscript>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
