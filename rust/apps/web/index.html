<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2d2d2d">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta
      name="description"
      content="无需注册的临时点对点文本与文件传输工具"
    >
    <link rel="manifest" href="/manifest.webmanifest">
    <title>{app_title}</title>
    <link rel="stylesheet" href="/shell/landing.css">
    <script src="/shell/app-shell.js" defer></script>
  </head>
  <body>
    <div id="main">
      <main id="boot-fallback" class="landing-shell" aria-busy="true">
        <section class="landing-panel" aria-labelledby="boot-title">
          <header>
            <p class="eyebrow">P2P Transmission</p>
            <h1 id="boot-title">正在准备安全传输</h1>
            <p class="join-copy">正在初始化本地加密与点对点连接能力，请稍候。</p>
          </header>
          <p class="boot-progress" role="status" aria-live="polite">加载传输工作区…</p>
          <noscript>
            <p class="privacy-copy">传输工作区需要浏览器启用 JavaScript 和 WebAssembly。</p>
            <p class="boot-actions"><a class="secondary-button" href="/">返回首页</a></p>
          </noscript>
        </section>
      </main>
    </div>
  </body>
</html>
