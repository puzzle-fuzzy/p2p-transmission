name: Verify

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "deploy/coturn/**"
      - "scripts/check_coturn_config.py"
      - "scripts/test_check_coturn_config.py"
      - ".github/workflows/verify.yml"

permissions:
  contents: read

jobs:
  coturn:
    name: TURN configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run TURN configuration unit tests
        run: python -X utf8 -m unittest scripts/test_check_coturn_config.py

      - name: Validate the coturn Compose and relay policy
        run: python -X utf8 scripts/check_coturn_config.py

  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.6 --locked

      - name: Run verification
        run: python -X utf8 scripts/verify.py

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "1.3.14"

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.6 --locked

      - name: Run browser smoke E2E
        run: python -X utf8 scripts/test_e2e.py

      - name: Run browser performance contract
        run: python -X utf8 scripts/test_e2e.py --performance

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/performance/
          if-no-files-found: ignore
