name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "1.3.14"

      - name: Run verification
        run: bun run verify

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "1.3.14"

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run browser E2E
        run: bun run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://p2p.yxswy.com
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate release version
        id: release
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          VERSION="$(python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          package = json.loads(Path('services/api/package.json').read_text(encoding='utf-8'))
          print(f"{package['version']}-{os.environ['GITHUB_SHA'][:7]}")
          PY
          )"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure deployment SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.TENCENT_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Create source release archive
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: git archive --format=tar.gz --output="p2p-transmission-$GITHUB_SHA.tar.gz" "$GITHUB_SHA"

      - name: Upload source release
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: scp "p2p-transmission-$GITHUB_SHA.tar.gz" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/p2p-transmission-$GITHUB_SHA.tar.gz"

      - name: Deploy and verify production
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: >-
          ssh "$DEPLOY_USER@$DEPLOY_HOST"
          "sudo /usr/local/sbin/p2p-transmission-deploy
          --archive /tmp/p2p-transmission-$GITHUB_SHA.tar.gz
          --version $RELEASE_VERSION"

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
