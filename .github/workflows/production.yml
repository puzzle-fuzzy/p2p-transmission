name: Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rust/**"
      - "scripts/*.py"
      - "!scripts/check_coturn_config.py"
      - "!scripts/test_check_coturn_config.py"
      - "scripts/*.ts"
      - "e2e/*.spec.ts"
      - "e2e/playwright.config.ts"
      - "e2e/playwright.public.config.ts"
      - "e2e/playwright.stress.config.ts"
      - "package.json"
      - "bun.lock"
      - "deploy/production/**"
      - "deploy/scripts/**"
      - ".github/workflows/production.yml"

permissions:
  contents: read

jobs:
  coturn:
    name: TURN configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: python -X utf8 -m unittest scripts/test_check_coturn_config.py
      - run: python -X utf8 scripts/check_coturn_config.py

  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit --deny warnings
      - run: cargo fmt --all -- --check
      - run: python -X utf8 scripts/check_web_architecture.py
      - run: python -X utf8 scripts/check_server_architecture.py
      - run: python -X utf8 -m unittest discover -s deploy/scripts -p "test_*.py"
      - run: cargo clippy --locked -p p2p-domain -p p2p-protocol -p p2p-transfer -p p2p-server -p p2p-ui-shell --all-targets -- -D warnings
      - run: cargo test --locked
      - run: cargo test --locked -p p2p-browser-platform -p p2p-web
      - run: cargo build --locked -p p2p-server --release

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: cargo clippy --locked -p p2p-browser-platform -p p2p-web --target wasm32-unknown-unknown -- -D warnings
      - run: python -X utf8 scripts/dev.py --profile release --build-only
      - run: python -X utf8 scripts/check_web_bundle.py

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: test "$(bun --version)" = "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run test:service-worker
      - run: bunx playwright install --with-deps chromium firefox webkit
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: python -X utf8 scripts/test_e2e.py --full

  container:
    runs-on: ubuntu-latest
    needs: [coturn, native, wasm]
    timeout-minutes: 30
    outputs:
      app-version: ${{ steps.release.outputs.app-version }}
      release-version: ${{ steps.release.outputs.release-version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Calculate release version
        id: release
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          APP_VERSION="$(python3 - <<'PY'
          from pathlib import Path

          for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines():
              if line.startswith('version = '):
                  print(line.split('=', 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit('workspace version is missing')
          PY
          )"
          RELEASE_VERSION="$APP_VERSION-${GITHUB_SHA:0:7}"
          echo "app-version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release-version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - run: docker compose --env-file deploy/production/.env.example -f deploy/production/compose.yml config
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build release image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/production/Dockerfile
          load: true
          tags: "p2p-transmission:${{ steps.release.outputs.release-version }}"
          build-args: |
            P2P_RELEASE_VERSION=${{ steps.release.outputs.release-version }}
          cache-from: type=gha,scope=production-image
          cache-to: type=gha,scope=production-image,mode=max,ignore-error=true
      - name: Export release image
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.release-version }}
        run: docker save "p2p-transmission:$RELEASE_VERSION" | gzip -1 > "p2p-transmission-image-$GITHUB_SHA.tar.gz"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-image-${{ github.sha }}
          path: p2p-transmission-image-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy production
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [coturn, native, wasm, e2e, container]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: production
      url: https://p2p.yxswy.com
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check release is still current main
        id: release_head
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          expected = os.environ['EXPECTED_SHA']
          output = subprocess.check_output(
              ['git', 'ls-remote', '--exit-code', 'origin', 'refs/heads/main'],
              text=True,
          )
          current = output.split()[0]
          is_current = current == expected
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as result:
              result.write(f"current={str(is_current).lower()}\n")
          if not is_current:
              print(f"::notice::Skipping superseded release {expected}; main is {current}")
          PY

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: steps.release_head.outputs.current == 'true'
        with:
          bun-version: 1.3.14
      - name: Prepare the lightweight public browser verifier
        if: steps.release_head.outputs.current == 'true'
        run: |
          test "$(bun --version)" = "1.3.14"
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium
      - name: Verify TURN relay before staging
        id: turn_preflight
        if: steps.release_head.outputs.current == 'true'
        env:
          P2P_PUBLIC_BASE_URL: https://p2p.yxswy.com
        run: bunx playwright test --config e2e/playwright.public.config.ts --grep 'relay ICE candidate$'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: steps.release_head.outputs.current == 'true'
        with:
          name: production-image-${{ github.sha }}

      - name: Configure deployment SSH
        if: steps.release_head.outputs.current == 'true'
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.TENCENT_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Verify the fixed host deployment control plane
        id: control_plane
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
        run: |
          HELPER_SHA256="$(python3 -I -B -X utf8 deploy/scripts/deploy-release.py control-plane-manifest --format sha256)"
          echo "sha256=$HELPER_SHA256" >> "$GITHUB_OUTPUT"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/sudo -n /usr/local/sbin/p2p-transmission-deploy control-plane-status --expected-sha256 $HELPER_SHA256"

      - name: Create source release archive
        if: steps.release_head.outputs.current == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: git archive --format=tar.gz --output="p2p-transmission-$GITHUB_SHA.tar.gz" "$GITHUB_SHA"

      - name: Stage the Rust image and retain rollback state
        id: stage
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          EXPECTED_CONTROL_PLANE_SHA256: ${{ steps.control_plane.outputs.sha256 }}
        run: |
          SOURCE_ARCHIVE="p2p-transmission-$GITHUB_SHA.tar.gz"
          IMAGE_ARCHIVE="p2p-transmission-image-$GITHUB_SHA.tar.gz"
          SUPERVISOR="p2p-transmission-deploy-$GITHUB_SHA-supervisor.py"
          SUPERVISOR_BUNDLE="$RUNNER_TEMP/$SUPERVISOR"
          python3 -I -B -X utf8 deploy/scripts/build_deployment_supervisor.py \
            --output "$SUPERVISOR_BUNDLE"
          chmod 600 "$SUPERVISOR_BUNDLE" "$SOURCE_ARCHIVE" "$IMAGE_ARCHIVE"
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$SUPERVISOR_BUNDLE" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/$SUPERVISOR"
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$SOURCE_ARCHIVE" "$IMAGE_ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod 600 /tmp/$SUPERVISOR /tmp/$SOURCE_ARCHIVE /tmp/$IMAGE_ARCHIVE"
          # The unprivileged supervisor detaches and tracks the fixed
          # sudo-approved stage wrapper. An SSH disconnect can therefore
          # never race rollback against an unfinished runtime switch.
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/python3 -I -B -X utf8 /tmp/$SUPERVISOR start --operation-id $GITHUB_SHA --version $RELEASE_VERSION --expected-control-plane-sha256 $EXPECTED_CONTROL_PLANE_SHA256"
          WAIT_DEADLINE=$((SECONDS + 1800))
          while true; do
            set +e
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "/usr/bin/python3 -I -B -X utf8 /tmp/$SUPERVISOR wait --operation-id $GITHUB_SHA --version $RELEASE_VERSION --expected-control-plane-sha256 $EXPECTED_CONTROL_PLANE_SHA256 --timeout 20 --poll-interval 2"
            SUPERVISOR_STATUS=$?
            set -e
            if [[ "$SUPERVISOR_STATUS" == "0" ]]; then
              break
            fi
            if [[ "$SUPERVISOR_STATUS" != "22" && "$SUPERVISOR_STATUS" != "255" ]]; then
              exit "$SUPERVISOR_STATUS"
            fi
            if (( SECONDS >= WAIT_DEADLINE )); then
              echo 'timed out reconnecting to the deployment supervisor' >&2
              exit 22
            fi
            sleep 5
          done
      - name: Verify the public Rust service
        id: public_verify
        if: steps.release_head.outputs.current == 'true'
        env:
          EXPECTED_APP_VERSION: ${{ needs.container.outputs.app-version }}
          EXPECTED_RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
        run: |
          python3 deploy/scripts/verify-public-release.py \
            --app-version "$EXPECTED_APP_VERSION" \
            --release-version "$EXPECTED_RELEASE_VERSION"

      - name: Verify the public WSS and WebRTC transfer
        id: public_browser_verify
        if: steps.release_head.outputs.current == 'true'
        env:
          P2P_PUBLIC_BASE_URL: https://p2p.yxswy.com
        run: bunx playwright test --config e2e/playwright.public.config.ts --grep 'over WSS$'

      - name: Verify the staged TURN relay transfer
        id: public_relay_verify
        if: steps.release_head.outputs.current == 'true'
        env:
          P2P_PUBLIC_BASE_URL: https://p2p.yxswy.com
        run: bunx playwright test --config e2e/playwright.public.config.ts --grep 'through TURN relay$'

      - name: Revalidate main and the fixed control plane before finalize
        id: finalize_preflight
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_CONTROL_PLANE_SHA256: ${{ steps.control_plane.outputs.sha256 }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          expected = os.environ['EXPECTED_SHA']
          output = subprocess.check_output(
              ['git', 'ls-remote', '--exit-code', 'origin', 'refs/heads/main'],
              text=True,
          )
          current = output.split()[0]
          if current != expected:
              raise SystemExit(
                  f'refusing to finalize superseded release {expected}; main is {current}'
              )
          PY
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/sudo -n /usr/local/sbin/p2p-transmission-deploy control-plane-status --expected-sha256 $EXPECTED_CONTROL_PLANE_SHA256"

      - name: Finalize the publicly verified release
        id: finalize
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
        run: |
          # Release values are locally validated identifiers.
          # shellcheck disable=SC2029
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/sudo -n /usr/local/sbin/p2p-transmission-deploy finalize --version $RELEASE_VERSION"

      - name: Roll back any staged release that was not finalized
        id: rollback
        if: always() && steps.release_head.outputs.current == 'true' && steps.stage.outcome != 'skipped' && steps.finalize.outcome != 'success'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          EXPECTED_CONTROL_PLANE_SHA256: ${{ steps.control_plane.outputs.sha256 }}
        run: |
          SUPERVISOR="p2p-transmission-deploy-${{ github.sha }}-supervisor.py"
          WAIT_DEADLINE=$((SECONDS + 1800))
          SUPERVISOR_STATUS=22
          while [[ "$SUPERVISOR_STATUS" == "22" || "$SUPERVISOR_STATUS" == "255" ]]; do
            set +e
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "/usr/bin/python3 -I -B -X utf8 /tmp/$SUPERVISOR wait --operation-id ${{ github.sha }} --version $RELEASE_VERSION --expected-control-plane-sha256 $EXPECTED_CONTROL_PLANE_SHA256 --timeout 20 --poll-interval 2"
            SUPERVISOR_STATUS=$?
            set -e
            if (( SECONDS >= WAIT_DEADLINE )) && \
              [[ "$SUPERVISOR_STATUS" == "22" || "$SUPERVISOR_STATUS" == "255" ]]; then
              echo 'timed out reconciling the deployment supervisor' >&2
              exit 1
            fi
            if [[ "$SUPERVISOR_STATUS" == "22" || "$SUPERVISOR_STATUS" == "255" ]]; then
              sleep 5
            fi
          done
          if [[ "$SUPERVISOR_STATUS" == "25" ]]; then
            echo 'another detached deployment worker still owns the global lock; refusing concurrent rollback' >&2
            exit 1
          fi
          if [[ "$SUPERVISOR_STATUS" != "0" && "$SUPERVISOR_STATUS" != "23" ]]; then
            echo "deployment state is not safely recoverable: $SUPERVISOR_STATUS" >&2
            exit 1
          fi
          # The supervisor has proved the stage worker ended; the fixed helper
          # can now reconcile its durable pending state without racing it.
          # shellcheck disable=SC2029
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/sudo -n /usr/local/sbin/p2p-transmission-deploy rollback --version $RELEASE_VERSION"

      - name: Remove temporary remote release artifacts
        id: cleanup
        if: always() && steps.release_head.outputs.current == 'true' && (steps.finalize.outcome == 'success' || steps.rollback.outcome == 'success')
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          EXPECTED_CONTROL_PLANE_SHA256: ${{ steps.control_plane.outputs.sha256 }}
        run: |
          SUPERVISOR="p2p-transmission-deploy-$GITHUB_SHA-supervisor.py"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/bin/python3 -I -B -X utf8 /tmp/$SUPERVISOR cleanup --operation-id $GITHUB_SHA --version $RELEASE_VERSION --expected-control-plane-sha256 $EXPECTED_CONTROL_PLANE_SHA256"

      - name: Report preserved recovery artifacts
        if: always() && steps.release_head.outputs.current == 'true' && steps.stage.outcome != 'skipped' && steps.cleanup.outcome != 'success'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "::error title=Deployment recovery unresolved::Remote recovery artifacts were preserved on $DEPLOY_HOST"
          printf '%s\n' \
            "Recovery artifact candidates on $DEPLOY_HOST:" \
            "/tmp/p2p-transmission-deploy-$GITHUB_SHA-supervisor.py" \
            "/tmp/p2p-transmission-deploy-$GITHUB_SHA-operation.json" \
            "/tmp/p2p-transmission-deploy-$GITHUB_SHA-status.json" \
            "/tmp/p2p-transmission-deploy-$GITHUB_SHA-worker.log" \
            "/tmp/p2p-transmission-deploy-$GITHUB_SHA-worker.pid" \
            "/tmp/p2p-transmission-$GITHUB_SHA.tar.gz" \
            "/tmp/p2p-transmission-image-$GITHUB_SHA.tar.gz" \
            "/opt/p2p-transmission/deploy/production/rollback/pending.json" \
            "/opt/p2p-transmission/deploy/production/rollback/ (protected snapshots referenced by pending.json)" \
            "Do not delete these files; inspect only the snapshot/backup paths in pending.json without printing its environment payload."
          exit 1

      - name: Preserve public browser diagnostics
        if: always() && (steps.turn_preflight.outcome == 'failure' || steps.public_browser_verify.outcome == 'failure' || steps.public_relay_verify.outcome == 'failure')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-browser-${{ github.run_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
