name: Production

on:
  push:
    branches: [rust-dev, main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rust/**"
      - "scripts/*.py"
      - "e2e/*.spec.ts"
      - "e2e/playwright.config.ts"
      - "e2e/playwright.stress.config.ts"
      - "package.json"
      - "bun.lock"
      - "deploy/production/**"
      - "deploy/scripts/**"
      - ".github/workflows/production.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rust/**"
      - "scripts/*.py"
      - "e2e/*.spec.ts"
      - "e2e/playwright.config.ts"
      - "e2e/playwright.stress.config.ts"
      - "package.json"
      - "bun.lock"
      - "deploy/production/**"
      - "deploy/scripts/**"
      - "docs/release/**"
      - ".github/workflows/production.yml"

permissions:
  contents: read

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit --deny warnings
      - run: cargo fmt --all -- --check
      - run: python -X utf8 -m unittest discover -s deploy/scripts -p "test_*.py"
      - run: cargo clippy --locked -p p2p-domain -p p2p-protocol -p p2p-transfer -p p2p-test-support -p p2p-server --all-targets -- -D warnings
      - run: cargo test --locked
      - run: cargo test --locked -p p2p-browser-platform -p p2p-web
      - run: cargo build --locked -p p2p-server --release

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: cargo clippy --locked -p p2p-browser-platform -p p2p-web --target wasm32-unknown-unknown -- -D warnings
      - run: python -X utf8 scripts/dev.py --profile release --build-only
      - run: python -X utf8 scripts/check_web_bundle.py

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: test "$(bun --version)" = "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium firefox webkit
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: python -X utf8 scripts/test_e2e.py

  container:
    runs-on: ubuntu-latest
    needs: [native, wasm]
    timeout-minutes: 30
    outputs:
      app-version: ${{ steps.release.outputs.app-version }}
      release-version: ${{ steps.release.outputs.release-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate release version
        id: release
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          APP_VERSION="$(python3 - <<'PY'
          from pathlib import Path

          for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines():
              if line.startswith('version = '):
                  print(line.split('=', 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit('workspace version is missing')
          PY
          )"
          RELEASE_VERSION="$APP_VERSION-${GITHUB_SHA:0:7}"
          echo "app-version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release-version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - run: docker compose --env-file deploy/production/.env.example -f deploy/production/compose.yml config
      - name: Build release image
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release-version }}
        run: docker build --file deploy/production/Dockerfile --tag "p2p-transmission:$RELEASE_VERSION" .
      - name: Export release image
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.release-version }}
        run: docker save "p2p-transmission:$RELEASE_VERSION" | gzip -1 > "p2p-transmission-image-$GITHUB_SHA.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: production-image-${{ github.sha }}
          path: p2p-transmission-image-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [native, wasm, e2e, container]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://p2p.yxswy.com
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: production-image-${{ github.sha }}

      - name: Configure deployment SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.TENCENT_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Create source release archive
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: git archive --format=tar.gz --output="p2p-transmission-$GITHUB_SHA.tar.gz" "$GITHUB_SHA"

      - name: Deploy the Rust image and switch production
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
        run: |
          SOURCE_ARCHIVE="p2p-transmission-$GITHUB_SHA.tar.gz"
          IMAGE_ARCHIVE="p2p-transmission-image-$GITHUB_SHA.tar.gz"
          scp "$SOURCE_ARCHIVE" "$IMAGE_ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
          # Release values are locally validated identifiers.
          # shellcheck disable=SC2029
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo /usr/local/sbin/p2p-transmission-deploy --archive /tmp/$SOURCE_ARCHIVE --image-archive /tmp/$IMAGE_ARCHIVE --version $RELEASE_VERSION"

      - name: Verify the public Rust service
        env:
          EXPECTED_APP_VERSION: ${{ needs.container.outputs.app-version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          expected = os.environ['EXPECTED_APP_VERSION']
          for attempt in range(30):
              try:
                  with urllib.request.urlopen(
                      'https://p2p.yxswy.com/health/ready', timeout=5
                  ) as response:
                      payload = json.load(response)
                  if (
                      response.status == 200
                      and payload.get('status') == 'ready'
                      and payload.get('service') == 'p2p-server'
                      and payload.get('version') == expected
                  ):
                      break
              except (OSError, ValueError):
                  pass
              if attempt == 29:
                  raise SystemExit('public readiness check failed')
              time.sleep(2)

          with urllib.request.urlopen('https://p2p.yxswy.com/', timeout=5) as response:
              index = response.read().decode('utf-8')
          if response.status != 200 or 'P2P Transmission' not in index:
              raise SystemExit('public web shell check failed')
          print(json.dumps(payload, ensure_ascii=False))
          PY

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
