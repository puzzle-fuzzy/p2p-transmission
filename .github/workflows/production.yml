name: Production

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rust/**"
      - "scripts/*.py"
      - "e2e/*.spec.ts"
      - "e2e/playwright.config.ts"
      - "e2e/playwright.stress.config.ts"
      - "package.json"
      - "bun.lock"
      - "deploy/production/**"
      - "deploy/scripts/**"
      - ".github/workflows/production.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rust/**"
      - "scripts/*.py"
      - "e2e/*.spec.ts"
      - "e2e/playwright.config.ts"
      - "e2e/playwright.stress.config.ts"
      - "package.json"
      - "bun.lock"
      - "deploy/production/**"
      - "deploy/scripts/**"
      - "docs/release/**"
      - ".github/workflows/production.yml"

permissions:
  contents: read

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit --deny warnings
      - run: cargo fmt --all -- --check
      - run: python -X utf8 scripts/check_web_architecture.py
      - run: python -X utf8 -m unittest discover -s deploy/scripts -p "test_*.py"
      - run: cargo clippy --locked -p p2p-domain -p p2p-protocol -p p2p-transfer -p p2p-server -p p2p-ui-shell --all-targets -- -D warnings
      - run: cargo test --locked
      - run: cargo test --locked -p p2p-browser-platform -p p2p-web
      - run: cargo build --locked -p p2p-server --release

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: cargo clippy --locked -p p2p-browser-platform -p p2p-web --target wasm32-unknown-unknown -- -D warnings
      - run: python -X utf8 scripts/dev.py --profile release --build-only
      - run: python -X utf8 scripts/check_web_bundle.py

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: test "$(bun --version)" = "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium firefox webkit
      - run: cargo install dioxus-cli --version 0.7.6 --locked
      - run: python -X utf8 scripts/test_e2e.py --full

  container:
    runs-on: ubuntu-latest
    needs: [native, wasm]
    timeout-minutes: 30
    outputs:
      app-version: ${{ steps.release.outputs.app-version }}
      release-version: ${{ steps.release.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6
      - name: Calculate release version
        id: release
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          APP_VERSION="$(python3 - <<'PY'
          from pathlib import Path

          for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines():
              if line.startswith('version = '):
                  print(line.split('=', 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit('workspace version is missing')
          PY
          )"
          RELEASE_VERSION="$APP_VERSION-${GITHUB_SHA:0:7}"
          echo "app-version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release-version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - run: docker compose --env-file deploy/production/.env.example -f deploy/production/compose.yml config
      - uses: docker/setup-buildx-action@v4
      - name: Build release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/production/Dockerfile
          load: true
          tags: "p2p-transmission:${{ steps.release.outputs.release-version }}"
          build-args: |
            P2P_RELEASE_VERSION=${{ steps.release.outputs.release-version }}
          cache-from: type=gha,scope=production-image
          cache-to: type=gha,scope=production-image,mode=max,ignore-error=true
      - name: Export release image
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.release-version }}
        run: docker save "p2p-transmission:$RELEASE_VERSION" | gzip -1 > "p2p-transmission-image-$GITHUB_SHA.tar.gz"
      - uses: actions/upload-artifact@v7
        with:
          name: production-image-${{ github.sha }}
          path: p2p-transmission-image-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [native, wasm, e2e, container]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: production
      url: https://p2p.yxswy.com
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release is still current main
        id: release_head
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          expected = os.environ['EXPECTED_SHA']
          output = subprocess.check_output(
              ['git', 'ls-remote', '--exit-code', 'origin', 'refs/heads/main'],
              text=True,
          )
          current = output.split()[0]
          is_current = current == expected
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as result:
              result.write(f"current={str(is_current).lower()}\n")
          if not is_current:
              print(f"::notice::Skipping superseded release {expected}; main is {current}")
          PY

      - uses: actions/download-artifact@v8
        if: steps.release_head.outputs.current == 'true'
        with:
          name: production-image-${{ github.sha }}

      - name: Configure deployment SSH
        if: steps.release_head.outputs.current == 'true'
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.TENCENT_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Inspect installed deployment helper
        id: deploy_helper
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
        run: |
          set +e
          PROTOCOL="$(ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'sudo -n /usr/local/sbin/p2p-transmission-deploy protocol-version' 2>/dev/null)"
          PROBE_STATUS=$?
          set -e
          if [[ "$PROBE_STATUS" == "0" && "$PROTOCOL" == "2" ]]; then
            MODE=v2
          elif [[ "$PROBE_STATUS" != "0" ]]; then
            MODE=legacy
          else
            echo "unsupported deployment helper protocol: $PROTOCOL" >&2
            exit 1
          fi
          case "$MODE" in
            v2|legacy) ;;
            *) echo "unsupported deployment helper mode: $MODE" >&2; exit 1 ;;
          esac
          printf 'mode=%s\n' "$MODE" >> "$GITHUB_OUTPUT"

      - name: Prepare the disconnect-safe deployment supervisor
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          BRIDGE="p2p-transmission-legacy-$GITHUB_SHA-bridge.py"
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            deploy/scripts/legacy-deploy-bridge.py "$DEPLOY_USER@$DEPLOY_HOST:/tmp/$BRIDGE"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" "chmod 600 /tmp/$BRIDGE"

      - name: Prepare the one-time legacy helper migration
        id: legacy_baseline
        if: steps.release_head.outputs.current == 'true' && steps.deploy_helper.outputs.mode == 'legacy'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          BRIDGE="p2p-transmission-legacy-$GITHUB_SHA-bridge.py"
          SNAPSHOT_JSON="$(ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "python3 /tmp/$BRIDGE snapshot --operation-id $GITHUB_SHA --mode legacy")"
          SNAPSHOT_JSON="$SNAPSHOT_JSON" python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          snapshot = json.loads(os.environ['SNAPSHOT_JSON'])
          operation_id = os.environ['GITHUB_SHA']
          if (
              snapshot.get('schema') != 1
              or snapshot.get('operation_id') != operation_id
              or snapshot.get('mode') != 'legacy'
          ):
              raise SystemExit('legacy bridge snapshot does not match this release')
          previous_release = snapshot.get('previous_release')
          match = re.fullmatch(r'[A-Za-z0-9_.-]+-([0-9a-f]{7,40})', previous_release or '')
          if match is None:
              raise SystemExit('cannot identify the current production release for migration')

          subprocess.run(
              ['git', 'fetch', '--no-tags', '--depth=64', 'origin', 'main'],
              check=True,
          )
          previous_commit = subprocess.check_output(
              ['git', 'rev-parse', f'{match.group(1)}^{{commit}}'],
              text=True,
          ).strip()
          current_commit = os.environ['GITHUB_SHA']
          subprocess.run(
              ['git', 'merge-base', '--is-ancestor', previous_commit, current_commit],
              check=True,
          )

          expected_sources = {
              'compose_sha256': 'deploy/production/compose.yml',
              'nginx_sha256': 'deploy/production/nginx/p2p.yxswy.com.conf',
              'helper_sha256': 'deploy/scripts/deploy-release.py',
              'wrapper_sha256': 'deploy/scripts/p2p-transmission-deploy.sh',
          }
          for key, source in expected_sources.items():
              contents = subprocess.check_output(
                  ['git', 'show', f'{previous_commit}:{source}']
              )
              expected = hashlib.sha256(contents).hexdigest()
              if snapshot.get(key) != expected:
                  raise SystemExit(f'production {source} drifted from {previous_release}')

          expected_paths = {
              'compose_snapshot': f'/tmp/p2p-transmission-legacy-{operation_id}-compose.yml',
              'nginx_snapshot': f'/tmp/p2p-transmission-legacy-{operation_id}-nginx.conf',
          }
          for key, expected in expected_paths.items():
              if snapshot.get(key) != expected:
                  raise SystemExit(f'legacy bridge returned an unexpected {key}')

          outputs = {
              'previous-release': previous_release,
              'operation-state': f'/tmp/p2p-transmission-legacy-{operation_id}-status.json',
              'compose-snapshot': snapshot['compose_snapshot'],
              'nginx-snapshot': snapshot['nginx_snapshot'],
              'compose-sha256': snapshot['compose_sha256'],
              'nginx-sha256': snapshot['nginx_sha256'],
          }
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as result:
              for key, value in outputs.items():
                  result.write(f'{key}={value}\n')
          print(f'legacy helper migration baseline: {previous_release}')
          PY

      - name: Create source release archive
        if: steps.release_head.outputs.current == 'true'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          git archive --format=tar.gz --output="p2p-transmission-$GITHUB_SHA.tar.gz" "$GITHUB_SHA"
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          before = os.environ['BEFORE_SHA']
          current = os.environ['GITHUB_SHA']
          retired: list[str] = []
          if re.fullmatch(r'[0-9a-f]{40}', before) and before != '0' * 40:
              subprocess.run(
                  ['git', 'cat-file', '-e', f'{before}^{{commit}}'],
                  check=True,
              )
              output = subprocess.check_output(
                  [
                      'git',
                      'diff',
                      '--name-only',
                      '--diff-filter=D',
                      '--no-renames',
                      '-z',
                      before,
                      current,
                  ]
              )
              retired = [
                  name.decode('utf-8')
                  for name in output.split(b'\0')
                  if name
              ]
          target = Path(f'p2p-transmission-retired-{current}.json')
          target.write_text(
              json.dumps(retired, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(f'bootstrap retired source files: {len(retired)}')
          PY

      - name: Stage the Rust image and retain rollback state
        id: stage
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          HELPER_MODE: ${{ steps.deploy_helper.outputs.mode }}
          PREVIOUS_RELEASE: ${{ steps.legacy_baseline.outputs.previous-release }}
          OPERATION_STATE: ${{ steps.legacy_baseline.outputs.operation-state }}
          COMPOSE_SNAPSHOT: ${{ steps.legacy_baseline.outputs.compose-snapshot }}
          NGINX_SNAPSHOT: ${{ steps.legacy_baseline.outputs.nginx-snapshot }}
          COMPOSE_SHA256: ${{ steps.legacy_baseline.outputs.compose-sha256 }}
          NGINX_SHA256: ${{ steps.legacy_baseline.outputs.nginx-sha256 }}
        run: |
          SOURCE_ARCHIVE="p2p-transmission-$GITHUB_SHA.tar.gz"
          IMAGE_ARCHIVE="p2p-transmission-image-$GITHUB_SHA.tar.gz"
          RETIRED_FILES="p2p-transmission-retired-$GITHUB_SHA.json"
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$SOURCE_ARCHIVE" "$IMAGE_ARCHIVE" "$RETIRED_FILES" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod 600 /tmp/$SOURCE_ARCHIVE /tmp/$IMAGE_ARCHIVE /tmp/$RETIRED_FILES"
          BRIDGE="p2p-transmission-legacy-$GITHUB_SHA-bridge.py"
          # The unprivileged bridge detaches and tracks the fixed sudo-approved
          # wrapper for both helper protocols. An SSH disconnect can therefore
          # never race rollback against an unfinished runtime switch.
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "python3 /tmp/$BRIDGE start --operation-id $GITHUB_SHA --version $RELEASE_VERSION --mode $HELPER_MODE"
          WAIT_DEADLINE=$((SECONDS + 1800))
          while true; do
            set +e
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "python3 /tmp/$BRIDGE wait --operation-id $GITHUB_SHA --version $RELEASE_VERSION --mode $HELPER_MODE --timeout 20 --poll-interval 2"
            BRIDGE_STATUS=$?
            set -e
            if [[ "$BRIDGE_STATUS" == "0" ]]; then
              break
            fi
            if [[ "$BRIDGE_STATUS" != "22" && "$BRIDGE_STATUS" != "255" ]]; then
              exit "$BRIDGE_STATUS"
            fi
            if (( SECONDS >= WAIT_DEADLINE )); then
              echo 'timed out reconnecting to the deployment supervisor' >&2
              exit 22
            fi
            sleep 5
          done
          if [[ "$HELPER_MODE" == "legacy" ]]; then
            # shellcheck disable=SC2029
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "sudo -n /usr/local/sbin/p2p-transmission-deploy adopt-legacy --version $RELEASE_VERSION --previous-version $PREVIOUS_RELEASE --operation-state $OPERATION_STATE --compose-snapshot $COMPOSE_SNAPSHOT --nginx-snapshot $NGINX_SNAPSHOT --compose-sha256 $COMPOSE_SHA256 --nginx-sha256 $NGINX_SHA256"
          fi

      - name: Verify the public Rust service
        id: public_verify
        if: steps.release_head.outputs.current == 'true'
        env:
          EXPECTED_APP_VERSION: ${{ needs.container.outputs.app-version }}
          EXPECTED_RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
        run: |
          python3 deploy/scripts/verify-public-release.py \
            --app-version "$EXPECTED_APP_VERSION" \
            --release-version "$EXPECTED_RELEASE_VERSION"

      - name: Finalize the publicly verified release
        id: finalize
        if: steps.release_head.outputs.current == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
        run: |
          # Release values are locally validated identifiers.
          # shellcheck disable=SC2029
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -n /usr/local/sbin/p2p-transmission-deploy finalize --version $RELEASE_VERSION"

      - name: Roll back any staged release that was not finalized
        id: rollback
        if: always() && steps.release_head.outputs.current == 'true' && steps.stage.outcome != 'skipped' && steps.finalize.outcome != 'success'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          HELPER_MODE: ${{ steps.deploy_helper.outputs.mode }}
          PREVIOUS_RELEASE: ${{ steps.legacy_baseline.outputs.previous-release }}
          OPERATION_STATE: ${{ steps.legacy_baseline.outputs.operation-state }}
          COMPOSE_SNAPSHOT: ${{ steps.legacy_baseline.outputs.compose-snapshot }}
          NGINX_SNAPSHOT: ${{ steps.legacy_baseline.outputs.nginx-snapshot }}
          COMPOSE_SHA256: ${{ steps.legacy_baseline.outputs.compose-sha256 }}
          NGINX_SHA256: ${{ steps.legacy_baseline.outputs.nginx-sha256 }}
        run: |
          BRIDGE="p2p-transmission-legacy-${{ github.sha }}-bridge.py"
          WAIT_DEADLINE=$((SECONDS + 1800))
          BRIDGE_STATUS=22
          while [[ "$BRIDGE_STATUS" == "22" || "$BRIDGE_STATUS" == "255" ]]; do
            set +e
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "python3 /tmp/$BRIDGE wait --operation-id ${{ github.sha }} --version $RELEASE_VERSION --mode $HELPER_MODE --timeout 20 --poll-interval 2"
            BRIDGE_STATUS=$?
            set -e
            if (( SECONDS >= WAIT_DEADLINE )) && \
              [[ "$BRIDGE_STATUS" == "22" || "$BRIDGE_STATUS" == "255" ]]; then
              echo 'timed out reconciling the deployment supervisor' >&2
              exit 1
            fi
            if [[ "$BRIDGE_STATUS" == "22" || "$BRIDGE_STATUS" == "255" ]]; then
              sleep 5
            fi
          done
          if [[ "$BRIDGE_STATUS" == "25" ]]; then
            echo 'another detached deployment worker still owns the global lock; refusing concurrent rollback' >&2
            exit 1
          fi
          if [[ "$BRIDGE_STATUS" != "0" && "$BRIDGE_STATUS" != "23" ]]; then
            echo "deployment state is not safely recoverable: $BRIDGE_STATUS" >&2
            exit 1
          fi
          if [[ "$HELPER_MODE" == "legacy" ]]; then
            set +e
            PROTOCOL="$(ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'sudo -n /usr/local/sbin/p2p-transmission-deploy protocol-version' 2>/dev/null)"
            PROTOCOL_STATUS=$?
            set -e
            if [[ "$PROTOCOL_STATUS" != "0" || "$PROTOCOL" != "2" ]]; then
              echo 'legacy helper process ended before rollback support was installed' >&2
              exit 1
            fi
            # The bridge has proved the old process ended; rollback may now
            # classify a fully previous or fully target runtime without racing it.
            # shellcheck disable=SC2029
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "sudo -n /usr/local/sbin/p2p-transmission-deploy rollback --version $RELEASE_VERSION --bootstrap-previous-version $PREVIOUS_RELEASE --bootstrap-operation-state $OPERATION_STATE --bootstrap-compose-snapshot $COMPOSE_SNAPSHOT --bootstrap-nginx-snapshot $NGINX_SNAPSHOT --bootstrap-compose-sha256 $COMPOSE_SHA256 --bootstrap-nginx-sha256 $NGINX_SHA256"
          else
            # Release values are locally validated identifiers.
            # shellcheck disable=SC2029
            ssh -o BatchMode=yes -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "sudo -n /usr/local/sbin/p2p-transmission-deploy rollback --version $RELEASE_VERSION"
          fi

      - name: Remove temporary remote release artifacts
        id: cleanup
        if: always() && steps.release_head.outputs.current == 'true' && (steps.finalize.outcome == 'success' || steps.rollback.outcome == 'success')
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.container.outputs.release-version }}
          HELPER_MODE: ${{ steps.deploy_helper.outputs.mode }}
        run: |
          BRIDGE="p2p-transmission-legacy-$GITHUB_SHA-bridge.py"
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "python3 /tmp/$BRIDGE cleanup --operation-id $GITHUB_SHA --version $RELEASE_VERSION --mode $HELPER_MODE"

      - name: Report preserved recovery artifacts
        if: always() && steps.release_head.outputs.current == 'true' && steps.stage.outcome != 'skipped' && steps.cleanup.outcome != 'success'
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "::error title=Deployment recovery unresolved::Remote recovery artifacts were preserved on $DEPLOY_HOST"
          printf '%s\n' \
            "Recovery artifact candidates on $DEPLOY_HOST:" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-bridge.py" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-operation.json" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-status.json" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-worker.log" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-worker.pid" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-snapshot.json" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-compose.yml" \
            "/tmp/p2p-transmission-legacy-$GITHUB_SHA-nginx.conf" \
            "/tmp/p2p-transmission-$GITHUB_SHA.tar.gz" \
            "/tmp/p2p-transmission-image-$GITHUB_SHA.tar.gz" \
            "/tmp/p2p-transmission-retired-$GITHUB_SHA.json" \
            "/opt/p2p-transmission/deploy/production/rollback/pending.json" \
            "/opt/p2p-transmission/deploy/production/rollback/ (protected snapshots referenced by pending.json)" \
            "Do not delete these files; inspect only the snapshot/backup paths in pending.json without printing its environment payload."
          exit 1

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
