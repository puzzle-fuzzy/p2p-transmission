name: Production health

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-health
  cancel-in-progress: false

jobs:
  public-path:
    name: Public WSS and TURN relay
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: test "$(bun --version)" = "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Verify the current public browser path
        env:
          P2P_PUBLIC_BASE_URL: https://p2p.yxswy.com
        run: bun run e2e:public
      - name: Preserve browser diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-health-${{ github.run_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  host-storage:
    name: Host disk and SQLite restore drill
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: production
      url: https://p2p.yxswy.com
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Configure maintenance SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.TENCENT_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"
      - name: Check disk and drill the latest SQLite backup
        env:
          DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
          DEPLOY_USER: ${{ secrets.TENCENT_DEPLOY_USER }}
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'sudo -n /usr/local/sbin/p2p-transmission-deploy maintenance'
      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
