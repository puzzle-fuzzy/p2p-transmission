server {
    listen 80;
    listen [::]:80;
    server_name p2p.yxswy.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/p2p-acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name turn.p2p.yxswy.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/p2p-acme;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name p2p.yxswy.com;

    ssl_certificate /etc/letsencrypt/live/p2p.yxswy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2p.yxswy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3410;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }
}
