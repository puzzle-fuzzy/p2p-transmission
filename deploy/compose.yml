name: p2p-transmission

services:
  api:
    build:
      context: ..
      dockerfile: deploy/api/Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-mirror.ccs.tencentyun.com/oven/bun:1.3.14}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.sqlite
      CORS_ALLOWED_ORIGINS: https://p2p.yxswy.com
      TRUST_PROXY: "true"
      TRUSTED_PROXY_IPS: 127.0.0.1,172.30.0.1,172.17.0.1
    volumes:
      - type: bind
        source: ./data/api
        target: /data
    networks:
      appnet:
        ipv4_address: 172.30.0.20
    ports:
      - "127.0.0.1:3333:3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 15s

  web:
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-mirror.ccs.tencentyun.com/oven/bun:1.3.14}
        VITE_API_URL: https://p2p.yxswy.com
        VITE_TURN_MODE: ${VITE_TURN_MODE:-api}
        VITE_STUN_URLS: ${VITE_STUN_URLS:-}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-}
    restart: unless-stopped
    networks:
      appnet:
        ipv4_address: 172.30.0.30
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  coturn:
    image: coturn/coturn:4.14.0-r0
    restart: unless-stopped
    network_mode: host
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - type: bind
        source: ./coturn/.local/turnserver.conf
        target: /etc/coturn/turnserver.conf
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./coturn/.local/tls
        target: /run/coturn/tls
        read_only: true
        bind:
          create_host_path: false
    stop_grace_period: 10s

networks:
  appnet:
    ipam:
      config:
        - subnet: 172.30.0.0/24
