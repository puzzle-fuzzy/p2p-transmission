# Managed by deploy/production/bootstrap-host.sh.
# Keep remote commands and the SFTP/SCP subsystem available for the production
# workflow, but disable every interactive or forwarding capability.
Match User p2p-deploy
    AuthenticationMethods publickey
    PubkeyAuthentication yes
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    PermitEmptyPasswords no
    DisableForwarding yes
    AllowAgentForwarding no
    AllowTcpForwarding no
    AllowStreamLocalForwarding no
    X11Forwarding no
    PermitTunnel no
    PermitTTY no
    GatewayPorts no
    PermitUserRC no

# An included Match block otherwise leaks into files parsed after this one.
Match all
